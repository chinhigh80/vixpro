version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vixprodelivery-app
    container_name: vixprodelivery-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - vixpro

  webserver:
    image: nginx:alpine
    container_name: vixprodelivery-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - vixpro

  db:
    image: mysql:8.0
    container_name: vixprodelivery-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vixprodelivery}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - vixpro

networks:
  vixpro:
    driver: bridge

volumes:
  dbdata: