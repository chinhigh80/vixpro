version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vixprodelivery-app
    container_name: vixprodelivery-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - vixpro
    healthcheck:
      test: ["CMD", "php", "-r", "fsockopen('127.0.0.1', 9000) ?: exit(1);"]
      interval: 5s
      timeout: 2s
      retries: 10

  webserver:
    image: nginx:alpine
    container_name: vixprodelivery-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vixpro

  db:
    env_file: .env
    image: mysql:8.0
    container_name: vixprodelivery-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vixprodelivery}
      MYSQL_USER: ${DB_USERNAME:-vixprouser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - vixpro

networks:
  vixpro:
    driver: bridge

volumes:
  dbdata: